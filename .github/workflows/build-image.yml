name: Build Image

on:
  workflow_dispatch:
    inputs:
      tag:
        required: true
        description: 'The release tag to upload images to'
        default: '0.4.0'
      nix-config-ref:
        required: false
        description: 'The git ref of nix-config to build from'
        default: 'main'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            flake-attr: gaoos-installer-amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            flake-attr: gaoos-installer-arm64
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h

      - name: Clone nix-config
        uses: actions/checkout@v4
        with:
          repository: gao-os/nix-config
          ref: ${{ github.event.inputs.nix-config-ref }}
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build ISO image
        run: nix build .#nixosConfigurations.${{ matrix.flake-attr }}.config.system.build.isoImage

      - name: Generate checksum
        run: |
          iso_file=$(find result/iso -name '*.iso' -type f | head -1)
          iso_name=$(basename "$iso_file")
          sha256sum "$iso_file" | sed "s|.*/|  |" > "${iso_name}.sha256sum"

      - name: Upload ISO and checksum to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          iso_file=$(find result/iso -name '*.iso' -type f | head -1)
          iso_name=$(basename "$iso_file")
          gh release upload "${{ github.event.inputs.tag }}" \
            "$iso_file" \
            "${iso_name}.sha256sum" \
            --repo "${{ github.repository }}" \
            --clobber
